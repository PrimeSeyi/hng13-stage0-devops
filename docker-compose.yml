version: '3.8'

services:
  app-blue:
    build: .
    container_name: app-blue
    environment:
      - APP_COLOR=${BLUE_APP_COLOR}
    restart: always

  app-green:
    build: .
    container_name: app-green
    environment:
      - APP_COLOR=${GREEN_APP_COLOR}
    restart: always

  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "${WEB_PORT}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-blue
      - app-green
