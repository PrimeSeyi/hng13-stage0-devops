events {}

http {
    upstream my_app {
        # max_fails=1: If it fails even once, consider it dead.
        # fail_timeout=3s: Keep it marked as dead for 3 seconds before trying it again.
        server app-blue:80 max_fails=1 fail_timeout=3s;
        server app-green:80 max_fails=1 fail_timeout=3s;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://my_app;
            
            # --- STRICT TIMEOUTS ---
            # If a container takes more than 2 seconds to connect or reply, give up instantly!
            proxy_connect_timeout 2s;
            proxy_read_timeout 2s;
            proxy_send_timeout 2s;

            # If the container throws an error or times out, immediately move to the next upstream container
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}